name: Build and Release VSIX

on:
  push:
    branches: [main, master]
    tags:
      - 'v*'
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 0.1.0). Leave empty to use package.json version.'
        required: false
        default: ''

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Compile TypeScript
        run: npm run compile

      - name: Override version (manual dispatch)
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.version != '' }}
        run: |
          npm version ${{ inputs.version }} --no-git-tag-version

      - name: Extract version from package.json
        id: pkg
        run: |
          version=$(node -p "require('./package.json').version")
          echo "version=$version" >> $GITHUB_OUTPUT

      - name: Package VSIX
        run: |
          npx @vscode/vsce package --out "deepseek-copilot-provider-custom-${{ steps.pkg.outputs.version }}.vsix"

      - name: Upload VSIX as artifact
        uses: actions/upload-artifact@v4
        with:
          name: deepseek-copilot-provider-custom-v${{ steps.pkg.outputs.version }}
          path: "*.vsix"
          retention-days: 30

      - name: Create GitHub Release (tag push only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: "*.vsix"
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
